<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#8B0000">
    <title>ऑफ़लाइन / Offline — Tamboli Samaj Portal</title>
    <link href="/assets/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --accent: #8B0000; --accent-dark: #6b0000; }
        html { font-size: 62.5%; }
        body {
            font-family: "Inter", "Noto Sans Devanagari", sans-serif;
            font-size: 1.6rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fdf6ec 0%, #fff 100%);
            color: #0f172a;
            padding: 2rem;
            text-align: center;
        }
        .offline-card { max-width: 420px; }
        .offline-icon {
            width: 80px; height: 80px;
            background: rgba(139, 0, 0, 0.08);
            color: var(--accent);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 3.6rem;
            margin-bottom: 2rem;
        }
        h1 { font-size: 2.4rem; font-weight: 800; margin-bottom: 1rem; }
        p { color: #64748b; font-size: 1.45rem; margin-bottom: 2rem; line-height: 1.6; }
        .btn-retry {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 1rem 2.4rem;
            font-size: 1.4rem;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }
        .btn-retry:hover { background: var(--accent-dark); color: #fff; }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1>आप ऑफ़लाइन हैं</h1>
        <p>इंटरनेट कनेक्शन जांचें और पुनः प्रयास करें।<br>You are offline. Please check your connection and try again.</p>
        <a href="/" class="btn-retry">🔄 पुनः लोड करें / Reload</a>
    </div>
</body>
</html>
